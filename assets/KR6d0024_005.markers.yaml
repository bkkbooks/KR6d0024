  - {type: variant, offset: 16811, length: 209, content: '初總譬歎佛有樂無苦，次見火譬序眾生有苦無樂，今第三欲拔眾生之苦同佛無苦、與眾生之樂同佛有樂，但聖〔人〕－【聖】人【大】，〔－〕【聖】人雖能授＝救【聖】授【大】，救【聖】授救，物不能受，故有此譬來也。又為釋疑故來，一乘既是真實，佛初出世何不即說。是故釋云：佛初成道即欲為說，但聖雖能授、物不堪受，故咎在眾生、過非佛也。據身而言，上見火譬＋（譬）【聖】譬【大】，譬譬【聖】譬譬譬在法身地見眾生有苦無樂，今以本垂跡欲拔苦與樂也。據悲心〔悲〕－【聖】悲【大】，〔－〕【聖】悲

      事明者，上見火譬明大悲內充，今明旋還赴救即悲事也。凡夫二乘雖有悲心而無悲事故名少悲，今有悲心兼有悲事故名大悲也。以小悲故名假相悲，以大悲故名真實悲', 聖乙: ''}
