  - {type: variant, offset: 13896, length: 111, content: 老人生途以窮餘命無幾，譬如來此身最後無復餘生。故《釋論》云「我生胎分盡，是最末後身，我以得解脫，當復度眾生」。三者、取廢＝度【聖】＊廢【大】＊，度【聖】＊廢度化來＋（人）【聖】來【大】，來人【聖】來來人久作譬，昔為菩薩時教化諸子，諸子違教經於劫數，菩薩廢度化已久故名為老，〔故信解品云自念〕－【聖】故信解品云自念【大】，〔－〕【聖】故〈信解品〉云「自念老朽無有子息」。四者、借最後應付子財為譬故稱老年。五者, 聖乙: 三者}
