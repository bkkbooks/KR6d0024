  - {type: variant, offset: 7415, length: 147, content: 由解實故得記也。故下文云「我今無復疑悔，親於佛前得三菩提記」。二者、受記之言即是重明會三歸一，以聲聞作佛得＝即【聖】得【大】，即【聖】得即知佛乘是實，佛乘既實則聲聞為權。三者、用此引物，明有信〔心〕－【聖乙】心【大】，〔－〕【聖乙】心故便得受＝授【聖】受【大】，授【聖】受授記者，欲得受記宜生信心。四者、欲令身子欣果行因。五者、下文天龍八部乃至中下根人皆藉得記之言以為成信旨歸，故與受記。六者、發物往生淨土之志，既於淨土成佛並願隨從往生也, 聖乙: 也二者發物往生淨土之志}
