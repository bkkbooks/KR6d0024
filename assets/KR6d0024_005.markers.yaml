  - {type: variant, offset: 3422, length: 198, content: 故《毘曇》云「聞慧一向從教生＋（教生）【聖】生【大】，生教生【聖】生生教生，修慧一向（從）＋理【聖】理【大】，從理【聖】理從理生，思慧或〔時〕－【聖】時【大】，〔－〕【聖】時從理或時從教」。依今文，（聞）＋思【聖】思【大】，聞思【聖】思聞思修二慧并從理生也。《智度論》云「外書明婆羅門從梵天口生，於四姓眾生中最勝」，今隨俗歎從佛口生。佛是真梵天，從佛口生為最勝也。「從法化生」者，亦是借譬歎也。如諸天等從父母膝上忽然化生，於四生內為最勝，今從極法而化生乃是勝也。「得佛法分」者，此亦簡歎也。入佛法有二人：一、貪名利謂取財分，二、悟解佛法名取法分。今對昔者取小乘分，不名取於佛法，若取大乘名取佛法。如下文云「不失如來知見寶藏之分」即其事也, 聖乙: ''}
