  - {type: variant, offset: 15873, length: 74, content: 二者、就昔三乘根性不定，如《大品》六十菩薩退為羅漢，迦葉本是緣覺根性，值佛故成聲聞，聲聞之人若不值佛即成緣覺，以不定故所以言或。三者、昔雖有三乘根性終並成菩薩，故復云「或」〔也〕－【聖】也【大】，〔－〕【聖】也, 聖乙: ''}
