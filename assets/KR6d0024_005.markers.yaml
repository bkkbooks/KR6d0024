  - {type: variant, offset: 11702, length: 68, content: 又既同是聲聞，昔俱稟偏化而自已得解、餘人未解＋（餘人未解）【聖】未解【大】，未解餘人未解【聖】未解未解餘人未解，愍其同朋故須為請。又〈方便品〉末佛勸弘經，今為眾請即是受旨。又上授記明身子行因未來得（成）＋佛【聖】佛【大】，成佛【聖】佛成佛，今為眾請即是行因也。所, 聖乙: 也所以}
