  - {type: variant, offset: 7745, length: 215, content: 行因者謂三世行因也。前長行初明二萬億佛，所謂過去修＋（行）【聖】修【大】，修行【聖】修修行因也。次云「我今還欲令汝憶念本願」〔下〕－【聖】下【大】，〔－〕【聖】下，明現在修因也。今文明未來修因也。就文為二：初、明修因時節；二、正辨修因。《涅槃經》云「有旃陀羅一發心於此賢劫成佛」，而身子云無量劫成佛者，就教則久近適時，約悟無生亦久近隨意，以悟無生不見久近相異，亦不見成不成異。故《經》云「無量劫一念，〔一念〕－【聖】一念【大】，〔－〕【聖】一念無量劫，無來無積聚，而現諸劫事」，則即知了＋（悟）【聖】了【大】，了悟【聖】了了悟久近不二亦未曾久近。如《大品》云「生死道長，眾生性多，菩薩應如是正憶念，生死邊如虛空，眾生性邊亦如虛空，是中無生死往來亦無解脫者」，故＋（知）【聖】故【大】，故知【聖】故故知久近非久近也, 聖乙: 初明修因時節}
