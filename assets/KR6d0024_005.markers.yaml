  - {type: variant, offset: 6805, length: 108, content: 又身子本是小學今遂悟大者，此亦可疑。所以然者，諸大乘經皆令怖畏二乘＋（今二乘）【聖】二乘【大】，二乘今二乘【聖】二乘二乘今二乘之人遂得授記作佛者，墮於二〔乘〕－【聖】＊乘【大】＊，〔－〕【聖】＊乘地何所畏耶？是故釋云：身子久修佛慧故得悟解耳。若實證小乘則難悟大道。故《釋論》云「羅漢生淨土根鈍，於佛道迂迴稽留，不如直往菩薩，故諸大乘經令怖畏二乘也, 聖乙: ''}
