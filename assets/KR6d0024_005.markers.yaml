  - {type: variant, offset: 10973, length: 88, content: 所以有（此）＋四【聖】四【大】，此四【聖】四此四段者，中根之人聞上法說未解，更轉勢說法故舉譬喻曉之。既聞前法說復稟後譬喻即得信解，故有第二〈信解品〉。以所解是實，故如來舉藥草喻述成。領解於前、述成於後，心得決了行與佛相應則＝應即【聖】相應則【大】，應即【聖】相應，則應即當果可期，故為授記, 聖乙: ''}
