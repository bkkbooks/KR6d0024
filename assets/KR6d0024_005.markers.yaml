  - {type: variant, offset: 17563, length: 106, content: 又二段經文各有衣裓机案，初章經現通為衣裓，一乘因如机，一乘果如案；後章經亦有衣裓机案，〈多寶〉、〈涌出〉二品是現通，謂衣裓；說長壽之因如机，說長壽之果如案也。又以二事配經兩段者，初明乘權乘實譬如机案，即說法輪；後辨身權身實短長適化，謂神通輪，譬如衣裓, 聖乙: 如, 聖: 衣裓机案。初章經現通為衣裓。一乘因如机。一乘果如案。後章經亦有衣裓机案。多寶涌出二品是現通謂衣裓。說長壽之因如机。說長壽之果如案也。又以二事配經兩段者。初明乘權乘實譬如机案。即說法輪。後辨身權身實短長適化。謂神通輪。譬如衣裓}
