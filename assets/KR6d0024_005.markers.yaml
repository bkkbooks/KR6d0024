  - {type: variant, offset: 1021, length: 103, content: 又小乘之人而信大法，雖言已解容有僻謬；今欲自陳請佛印＝引【聖】＊印【大】＊，引【聖】＊印引定，故須述解也。又自陳領解即是重敷一乘，使守迷之徒因此得曉。又若上根人不序領悟，則中下之流便謂無人得解，教便虛設則望崖而退，為欲誨引迷情＝請【聖】情【大】，請【聖】情請故須述解也。又佛上自說則＝即【聖】則【大】，即【聖】則即是大人化小〔人〕－【聖】人【大】，〔－〕【聖】人，今, 聖乙: 又}
