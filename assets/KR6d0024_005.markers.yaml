  - {type: variant, offset: 1511, length: 88, content: 有人言：本就六心判聲聞緣覺，羅漢由是外凡豈無憂喜？此據理釋也。若就教釋此即無也，《成論》云「憂喜要從想分別生」，羅漢斷正使盡無復執惑，豈有憂喜耶？而經言有者，此義說慶悅之心為喜，例如義說無漏觀智為任放樂也, 聖乙: ''}
