  - {type: variant, offset: 12364, length: 283, content: 雖大悲內充復須方便外救，故初成道時即欲拔其有累、濟其無德；但父雖能授、子未堪受，故有一乘化不得譬。雖大志未成＝開【聖】成【大】，開【聖】成開，小機已動，故於一說三；應時即悟，故有三乘化子得譬。雖復說三終為歸一，是以還說實化〔之故有等賜大車〕－【聖】之故有等賜大車【大】，〔－〕【聖】之，故有等賜大車譬。許三與一似若妄談，但賜過所求，又本意與一，故非虛也，故有第六不虛譬。就此六譬合成五雙：初一為總，後五為別，謂總別一雙。聖人說法，前多總說、後則別說，故前總後〔別就〕－【聖】別就【大】，〔－〕【聖】別。就別中又開為二：初、見火譬明內起悲心，即是懸知＝照【聖】懸知【大】，照【聖】懸知照機，後之四譬應緣說教，謂機教一雙。就後教中復開為二：初之一譬頓化不得，後之三譬明漸化得子，謂頓漸一雙。就後漸中又開為二：初之一譬為說三乘教，後之兩譬明一乘教，謂三一一雙。就一乘中又開為二，初之一譬正明說教，後不虛譬名為會教，謂教及會教一雙, 聖乙: ''}
