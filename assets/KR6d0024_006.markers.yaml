  - {type: variant, offset: 8906, length: 80, content: 也。後文云「深著於五欲如犛牛愛尾」，謂起愛也；「深入＝著【聖】入【大】，著【聖】入著於邪見以苦欲捨苦」，謂起見也。〈方便品〉既前明於愛、後辨於見，蓋是法說明愛見前後，今此品中還譬上義，故前明怪鳥毒虫以譬於愛，夜叉惡鬼譬彼見也, 聖乙: ''}
