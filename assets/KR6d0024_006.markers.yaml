  - {type: variant, offset: 16452, length: 52, content: 明起權意；二、說教；三、得益；四、父喜。今但頌二：初一行半，頌說三乘；〔次〕－【聖】次【大】，〔－〕【聖】次一行半，頌得益。「以是方便」者，接上言勢仍發＋（於）【聖】發【大】，發於【聖】發發於下語，故言以是方便也, 聖乙: 知子宿好二說三乘三信受四父喜今但頌二初一行半頌說三乘信受得益}
