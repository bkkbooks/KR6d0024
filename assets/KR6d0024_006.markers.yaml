  - {type: variant, offset: 2987, length: 79, content: 反質者，謂佛虛妄本出聲聞；今令其自稱不虛，則不虛事實，故《釋論》云「佛反質身子，令身子口＋（願）【聖】口【大】，口願【聖】口口願自稱不及菩薩，則審大小優劣之異」。今亦然也。又身子既已領悟則知三一，迹返而旨符，故寄之融會息眾疑也, 聖乙: ''}
