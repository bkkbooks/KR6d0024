  - {type: variant, offset: 8307, length: 241, content: 有人言：從「有一大宅」至「而復頓弊」，總序三界無常也。從「堂舍高危」以下，別序五陰四大無常也。「堂舍」者總明五陰是眾生所栖，是故經云「五陰舍宅觀悉空寂」；「柱根」以下別明五陰無常也。色陰中地大能持故為柱，〔柱〕－【聖】柱【大】，〔－〕【聖】柱分分不實如摧朽也。識陰為一身之主是梁棟，識無定主如幻為傾科＝斜【聖】科【大】，斜【聖】科斜；行陰是一身之本為基陛，一起一滅為頹毀；亂想周障取像而不實為牆壁圮【CB】，𡉏【大】圮𡉏坼；三受互起不住如埿塗褫落，此序五陰無常竟。「覆苫亂墜」下，別明四大無常〔也〕－【聖】也【大】，〔－〕【聖】也。風大能傾覆為覆苫亂墜，椽梠不能相持，似堅而非堅，譬地大之不實也。「周障屈曲」，如火大遍在一形之中，隨身老壯火＝大【聖】火【大】，大【聖】火大有強弱不得自在也。「雜穢充遍」者，六根膿血渧唾不淨，譬水大也, 聖乙: ''}
