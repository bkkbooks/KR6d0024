  - {type: variant, offset: 16702, length: 48, content: 雖復等賜，恐未必受，是故勸信。上半正勸信。「信受是語」者，則＝即【聖】則【大】，即【聖】則即上譬喻之語也。「一切皆當〔得〕－【聖】得【大】，〔－〕【聖】得成佛道」者，略標旨歸，令作如斯信也, 聖乙: '', 聖: 上半正勸信信受是語者則上譬喻之語也一切皆當得成佛道者略標旨歸令作如斯信也}
