  - {type: variant, offset: 86, length: 197, content: 索車是一經大宗，今略釋之。有人言：昔得羅漢後出遊觀心，以天眼照見未來猶有生死，則煩惱未盡未有盡智，猶有生死無無生智。佛何故說羅漢有盡、無生智耶？以就佛索覓盡、無生智故言索車，車者即是盡、無生智也。今謂不然，昔既見有生死未盡，即知三乘非是究竟，亦應即知一乘是究竟，云何復有索也。又三藏教內明羅漢，云何已得知三界外事也？若小乘已明三界外事，與大乘復有何異耶？今所明者索車之譬但就今辨，非昔教存也。但索車譬凡有二門：一者、無索假設索譬，二、約疑情明有索也。言, 聖乙: 但索車譬}
