  - {type: variant, offset: 16543, length: 58, content: 又說〔於〕－【聖】於【大】，〔－〕【聖】於三乘，示得失耳，非實有三也。「知三界苦」者，三界〔苦〕－【聖】苦【大】，〔－〕【聖】苦是實苦也。「出世間道」者，大乘因為道也。此意明說三，令知苦是實，令修大乘因耳，非為小果也, 聖乙: ''}
