  - {type: variant, offset: 3630, length: 180, content: '今先總序合譬之大意，略有四義：一者、譬中顯＝明【聖】顯【大】，明【聖】顯明者即＝則【聖】＊即【大】＊，則【聖】＊即則

      不合之。二者、譬中不具足者合更足之。三者、譬中一途次第，合譬即則復示一途，〔謂〕－【聖】謂【大】，〔－〕【聖】謂轉勢說法。四者＋（則）【聖】者【大】，者則【聖】者者則、依譬文而正合之。合此中六譬意〔者〕－【聖】者【大】，〔－〕【聖】者，合第一總，譬明佛有極樂無極苦；合第二見火譬，敘眾生有極苦無極樂；合第三救子不得譬，明初成道時即欲拔眾生極苦與其極樂，但未堪故息化；合第四救子得譬，且拔其重苦與其小樂；合第五等賜大車譬，拔〔其〕－【聖】其【大】，〔－〕【聖】其輕苦與其大樂；合第六不虛譬，明前許小樂後與大樂，義不相違', 聖乙: ''}
