  - {type: variant, offset: 5009, length: 81, content: '遊戲」謂於苦果上更起貪著，則＝即【聖】＊則【大】＊，即【聖】＊則即

      是重造苦因也。合上「而諸子等於火宅內樂著嬉戲」。「不覺不知」者，前明貪愛、今辨愚癡，即癡愛也。「於此三界火宅東西馳走」者，自上已＝以【聖】已【大】，以【聖】已以來見眾生受苦果、造苦因，今見其輪迴不息也', 聖乙: ''}
