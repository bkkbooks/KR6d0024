  - {type: punctuation, offset: 1070, content: 。, id: KR6d0024_T_006-bkkpn172}
  - {type: variant, offset: 1070, length: 119, content: 所與之人非一，故云各賜也。等一者，昔三機偏發＋（故）【聖】發【大】，發故【聖】發發故，以大車賜菩薩不賜二乘，故若＝名【聖】若【大】，名【聖】若名偏賜；今三病既消、大機並發，等與大車，對昔與偏，故今明等賜。故下文云「不令有人獨得願得滅度，皆以如來滅度而滅度之」，即其證也。「不令有人獨得滅度」者，不令菩薩獨得大涅槃也。「皆以如來滅度而滅度＋（之）【聖】度【大】，度之【聖】度度之」者，亦令二乘證大涅槃也, 聖乙: 等一}
